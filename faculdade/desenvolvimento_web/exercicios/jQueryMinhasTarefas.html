<!--

Implemente usando JQuery as funcionalidades de adicionar tarefa e excluir tarefas.

Pegue o código inicial em 

https://bitbucket.org/mbelo/labjs/src/inicial/jquery_tarefas.html

e modifique apenas a tag script, já indicada no código.

-->

<html>
<head>
	<meta charset="utf-8" />
	<title>Minha Lista de Tarefas</title>
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
</head>
<body>
	<h1>Minhas Tarefas</h1>
	
	<div id="tarefas">
		<div><input type="checkbox"/><span>Fazer tarefa de LPW</span></div>
	</div>

	<div id="acoes">
		<p>
			<input type="text" id="nova_tarefa" />
			<button id="incluir_tarefa">Incluir</button>
		</p>
		<p>
			<button id="excluir_tarefas">Excluir Tarefas</button>
		</p>
	</div>

	<script>
        $(function () {

            $('#incluir_tarefa').click(function () {
                var txt_tarefa = $('#nova_tarefa').val().trim();
                if (txt_tarefa !== "") {
                    var novo_item = $('<div><input type="checkbox"/><span>' + txt_tarefa + '</span></div>');
                    $('#tarefas').append(novo_item);
                }
                else{
                    window.alert("Digite uma tarefa!");
                }
                $('#nova_tarefa').val('').focus();
            })  

            $('#excluir_tarefas').click(function () {
                $('#tarefas input:checked').parent().remove();
            })
            
        })
	</script>
</body>
</html>
